<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hillway Aintree Sweepstake 2026</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Tenor+Sans&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a1a; color: #f5f5f5; min-height: 100vh; line-height: 1.6; }

  .header { background: #000; padding: 2.5rem 2rem 2rem; text-align: center; border-bottom: 1px solid #333; }
  .header-logo { width: 160px; margin-bottom: 1.2rem; }
  .header h1 { font-family: 'Tenor Sans', serif; font-size: 2.4rem; font-weight: 400; letter-spacing: -0.02em; color: #fff; line-height: 1.1; }
  .header p { color: #666; margin-top: .5rem; font-size: .9rem; letter-spacing: .02em; }

  .container { max-width: 900px; margin: 0 auto; padding: 1.5rem; }

  .setup { background: #000; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; border: 1px solid #333; }
  .setup h2 { margin-bottom: 1rem; font-size: 1.3rem; font-family: 'Tenor Sans', serif; font-weight: 400; }
  .setup label { display: block; font-size: .85rem; color: #999; margin-bottom: .3rem; }
  .player-inputs { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
  .player-inputs input { flex: 1; min-width: 120px; padding: .6rem .8rem; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 1rem; }
  .player-inputs input:focus { outline: none; border-color: #fff; }

  .stake-row { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.2rem; }
  .stake-row input { width: 80px; padding: .5rem; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 1rem; text-align: center; }
  .stake-row span { color: #aaa; font-size: .9rem; }

  .btn { padding: .7rem 1.8rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all .2s; }
  .btn-primary { background: #fff; color: #000; }
  .btn-primary:hover { background: #f5f5f5; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(255,255,255,.15); }
  .btn-secondary { background: transparent; color: #fff; border: 1px solid #333; }
  .btn-secondary:hover { border-color: #fff; }
  .btn-success { background: #2ecc71; color: #fff; }
  .btn-success:hover { background: #27ae60; }
  .btn-small { padding: .4rem 1rem; font-size: .85rem; }

  .day-tabs { display: flex; gap: .5rem; margin-bottom: 1.5rem; }
  .day-tab { flex: 1; padding: .8rem; text-align: center; border-radius: 10px; cursor: pointer; font-weight: 600; background: #000; border: 2px solid #333; transition: all .3s cubic-bezier(0.4, 0, 0.2, 1); }
  .day-tab.active { background: #fff; border-color: #fff; color: #000; }
  .day-tab:hover { border-color: #fff; }

  .scoreboard { background: #000; border-radius: 12px; padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; display: flex; justify-content: center; gap: 2rem; flex-wrap: wrap; border: 1px solid #333; }
  .score-item { text-align: center; }
  .score-name { font-size: .85rem; color: #aaa; margin-bottom: .2rem; }
  .score-value { font-size: 1.8rem; font-weight: 800; }

  .race { background: #000; border-radius: 12px; margin-bottom: 1rem; overflow: hidden; border: 1px solid #333; }
  .race-header { display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.2rem; cursor: pointer; transition: background .2s; }
  .race-header:hover { background: #1a1a1a; }
  .race-time { font-size: 1.4rem; font-weight: 400; font-family: 'Tenor Sans', serif; color: #fff; min-width: 60px; }
  .race-info { flex: 1; margin-left: 1rem; }
  .race-name { font-weight: 600; font-size: .95rem; color: #f5f5f5; }
  .race-meta { font-size: .8rem; color: #888; margin-top: .15rem; }
  .race-status { font-size: .75rem; padding: .3rem .8rem; border-radius: 20px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .status-pending { background: #333; color: #3498db; }
  .status-drawn { background: #1a3a1a; color: #2ecc71; }
  .status-result { background: #3a1a1a; color: #f1c40f; }

  .race-body { display: none; padding: 0 1.2rem 1.2rem; }
  .race-body.open { display: block; }

  .draw-grid { display: grid; gap: .8rem; margin-top: .8rem; }
  .player-draw { background: #1a1a1a; border-radius: 8px; padding: .8rem 1rem; }
  .player-draw-name { font-weight: 700; font-size: .9rem; margin-bottom: .4rem; }
  .horse-tags { display: flex; flex-wrap: wrap; gap: .3rem; }
  .horse-tag { background: #333; padding: .25rem .6rem; border-radius: 6px; font-size: .8rem; }
  .horse-tag.winner { background: #f1c40f; color: #000; font-weight: 700; }
  .horse-tag.placed { background: #cd7f32; color: #fff; font-weight: 600; }

  .winner-section { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #333; }
  .winner-section h4 { font-size: .85rem; color: #aaa; margin-bottom: .5rem; }
  .winner-select { display: flex; gap: .5rem; flex-wrap: wrap; }
  .winner-btn { padding: .3rem .7rem; border-radius: 6px; border: 1px solid #333; background: #1a1a1a; color: #ccc; cursor: pointer; font-size: .8rem; transition: all .15s; }
  .winner-btn:hover { border-color: #f1c40f; color: #f1c40f; }
  .winner-btn.selected-1st { background: #f1c40f; color: #000; border-color: #f1c40f; font-weight: 700; }
  .winner-btn.selected-2nd { background: #cd7f32; color: #fff; border-color: #cd7f32; font-weight: 700; }

  .result-banner { margin-top: .8rem; padding: .6rem 1rem; background: linear-gradient(90deg, #f1c40f22, transparent); border-left: 3px solid #f1c40f; border-radius: 4px; font-size: .9rem; }

  .actions { display: flex; gap: .5rem; margin-top: .8rem; }
  .hidden { display: none; }

  /* View tabs */
  .view-tabs { display: flex; gap: .5rem; margin-bottom: 1rem; }
  .view-tab { padding: .5rem 1.2rem; border-radius: 8px; cursor: pointer; font-size: .85rem; font-weight: 600; background: transparent; border: 1px solid #333; color: #999; transition: all .2s; }
  .view-tab.active { background: #fff; color: #000; border-color: #fff; }
  .view-tab:hover { border-color: #fff; color: #fff; }

  /* All Horses view */
  .horses-overview { margin-bottom: 1.5rem; }
  .player-portfolio { background: #000; border: 1px solid #333; border-radius: 12px; padding: 1.2rem; margin-bottom: 1rem; }
  .player-portfolio h3 { font-family: 'Tenor Sans', serif; font-weight: 400; font-size: 1.2rem; margin-bottom: .8rem; }
  .portfolio-race { margin-bottom: .6rem; }
  .portfolio-race-name { font-size: .75rem; color: #666; margin-bottom: .25rem; }
  .portfolio-horses { display: flex; flex-wrap: wrap; gap: .25rem; }

  /* Settlement */
  .settlement { background: #000; border: 1px solid #333; border-radius: 12px; padding: 1.5rem; margin-top: 1.5rem; }
  .settlement h3 { font-family: 'Tenor Sans', serif; font-weight: 400; font-size: 1.3rem; margin-bottom: 1rem; }
  .settlement-row { display: flex; justify-content: space-between; align-items: center; padding: .6rem 0; border-bottom: 1px solid #1a1a1a; }
  .settlement-row:last-child { border-bottom: none; }
  .settlement-name { font-weight: 600; }
  .settlement-amount { font-size: 1.1rem; font-weight: 700; }
  .settlement-positive { color: #27ae60; }
  .settlement-negative { color: #c62828; }
  .settlement-zero { color: #666; }
  .settlement-transfers { margin-top: 1rem; padding-top: 1rem; border-top: 1px solid #333; }
  .transfer-row { padding: .4rem 0; font-size: .9rem; color: #ccc; }
  .transfer-arrow { color: #666; margin: 0 .5rem; }

  /* Fetch button */
  .fetch-btn { position: relative; }
  .fetch-btn.loading::after { content: ''; display: inline-block; width: 14px; height: 14px; border: 2px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; margin-left: .5rem; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .confetti-piece { position: fixed; width: 10px; height: 10px; top: -10px; z-index: 999; pointer-events: none; }

  @media (max-width: 600px) {
    .header h1 { font-size: 1.6rem; }
    .player-inputs { flex-direction: column; }
    .scoreboard { gap: 1rem; }
    .score-value { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="header">
  <img src="hillway-logo.png" alt="Hillway" class="header-logo">
  <h1>Aintree Sweepstake 2026</h1>
  <p>Grand National Festival &mdash; Office Draw</p>
</div>

<div class="container">
  <div class="setup" id="setup">
    <h2>Who's in?</h2>
    <label>Player names (3-4 people)</label>
    <div class="player-inputs" id="playerInputs">
      <input type="text" placeholder="Player 1" data-idx="0">
      <input type="text" placeholder="Player 2" data-idx="1">
      <input type="text" placeholder="Player 3" data-idx="2">
      <input type="text" placeholder="Player 4" data-idx="3">
    </div>
    <div class="stake-row">
      <label style="margin:0">Stake per race: &pound;</label>
      <input type="number" id="stakeInput" value="2" min="0" step="1">
      <span>per person</span>
    </div>
    <button class="btn btn-primary" onclick="startSweepstake()">Start Sweepstake</button>
  </div>

  <div id="app" class="hidden">
    <div class="scoreboard" id="scoreboard"></div>
    <div class="day-tabs">
      <div class="day-tab active" onclick="switchDay('thursday')" id="tab-thursday">Thu 9 Apr &mdash; Day 1</div>
      <div class="day-tab" onclick="switchDay('friday')" id="tab-friday">Fri 10 Apr &mdash; Ladies Day</div>
    </div>

    <div class="view-tabs">
      <div class="view-tab active" onclick="switchView('races')" id="view-races">Races</div>
      <div class="view-tab" onclick="switchView('horses')" id="view-horses">All Horses</div>
      <div class="view-tab" onclick="switchView('settlement')" id="view-settlement">Settlement</div>
    </div>

    <div id="racesView">
      <div id="racesContainer"></div>
      <div style="text-align:center; margin: 1.5rem 0; display:flex; justify-content:center; gap:.5rem; flex-wrap:wrap;">
        <button class="btn btn-primary" onclick="drawAllRaces()">Draw All Races</button>
        <button class="btn btn-primary fetch-btn" id="fetchBtn" onclick="fetchResults()">Fetch Results</button>
        <button class="btn btn-secondary" onclick="resetDay()">Reset Day</button>
      </div>
    </div>

    <div id="horsesView" class="hidden">
      <div id="horsesContainer" class="horses-overview"></div>
    </div>

    <div id="settlementView" class="hidden">
      <div id="settlementContainer"></div>
    </div>
  </div>
</div>

<script>
const RACE_DATA = {
  thursday: [
    { time: "13:45", name: "Boodles Anniversary Juvenile Hurdle", grade: "Grade 1", distance: "2m 209y",
      runners: ["Ammes","Aqua Bleu","Indian River","Lord","Maestro Conti","Minella Study","Winston Junior","Wolf Rayet","Mange Tout","Selma De Vary"] },
    { time: "14:20", name: "William Hill Manifesto Novices' Chase", grade: "Grade 1", distance: "2m 3f 200y",
      runners: ["Blueking d'Oroux","Jax Junior","Koktail Divin","Lulamba","Mambonumberfive"] },
    { time: "14:55", name: "Racing Welfare Bowl Chase", grade: "Grade 1", distance: "3m 210y",
      runners: ["Impaire Et Passe","Jango Baie","Pic d'Orhy","Protektorat","Spillane's Tower"] },
    { time: "15:30", name: "Randox Foxhunters' Open Hunters' Chase", grade: "Class 2", distance: "2m 5f 19y",
      runners: ["A Jet Of Our Own","A Moments Madness","Barton Snow","Densworth","Empire De Maulde","Enqarde","Fairly Famous","Famous Clermont","Fan De Blues","Gaboriot","Golden Son","Gracchus De Balme","Great Notions","Its On The Line","Java Point","Joker De Mai","Lets Go Champ","Music Drive","Snipe","Take All","Thunder Rock","Unexpected Party","Whats The Solution","Willewonga","Hollywood Harmon"] },
    { time: "16:05", name: "William Hill Aintree Hurdle", grade: "Grade 1", distance: "2m 4f",
      runners: ["Alexei","El Fabiolo","Potters Charm","The New Lion","Brighterdaysahead","Golden Ace"] },
    { time: "16:40", name: "Close Brothers Red Rum Handicap Chase", grade: "Premier Handicap", distance: "2m",
      runners: ["Inthepocket","Hercule Du Seuil","Brookie","Boothill","Stencil","Jasko Des Dames","Sans Bruit","Highlands Legacy","Ryan's Rocket","Petit Tonnerre","Wonleg","Grain d'Oudairies","Javert Allen","Dr T J Eckleburg","Palamon"] },
    { time: "17:15", name: "Goffs Nickel Coin Mares' NH Flat Race", grade: "Grade 2", distance: "2m 209y",
      runners: ["Brave Lady","Burds Of A Feather","Divine Diva","Emerald Quest","Fairy Park","Kiltybo","Ladies Day","Lennon Grove","Midnight Musical","Nan's Choice","One Dimensional","Peace Belle","Princess Day","Seven Stars","Ti'mamzel","Tiktok Casey","Billey Shiftit","It Would Be You","Martini Majesty"] }
  ],
  friday: [
    { time: "13:45", name: "William Hill Handicap Hurdle", grade: "Premier Handicap", distance: "2m 4f",
      runners: ["Favour And Fortune","Rambo T","Indeevar Bleu","Fingle Bridge","Joyeuse","Fiercely Proud","Wellington Arch","Act Of Authority","Captain Teague","Swindon Village","Jet To Vegas","Hot Fuss","Bowmore","Faivoir","Fiveonefive","Jazzy Matty","Emid'io Pepe","Ballykinlar","Top Jimmy","Trustintimes","Ike Sport","Sir Galahad"] },
    { time: "14:20", name: "William Hill Mildmay Novices' Chase", grade: "Grade 1", distance: "3m 210y",
      runners: ["Crest Of Fortune","Doyen Quest","Gold Dancer","Jordans Cross","Miami Magic","Regent's Stroll","Salver","Wendigo"] },
    { time: "14:55", name: "ThatPrizeGuy Top Novices' Hurdle", grade: "Grade 1", distance: "2m 103y",
      runners: ["Baron Noir","Sinnatra","Sober Glory","Starting Fifteen","Storming George","La Conquiere"] },
    { time: "15:30", name: "JCB Melling Chase", grade: "Grade 1", distance: "2m 3f 200y",
      runners: ["Gidleigh Park","Grey Dawning","Heart Wood","JPR One","L'Eau du Sud","Saint Segal","Solness"] },
    { time: "16:05", name: "Randox Topham Handicap Chase", grade: "Premier Handicap", distance: "2m 5f 19y",
      runners: ["Il Est Francais","Matata","Gentleman De Mee","Ile Atlantique","Hitman","Croke Park","Madara","Boombawn","Eldorado Allen","Will The Wise","Addragoole","Soul Icon","Coming Up Easy","Viroflay","Prairie Wolf","Conflated","O'Moore Park","Booster Bob","Mahons Glory","Lisnamult Lad","Peaky Boy","Bill Baxter","Teddy Blue","Pour Les Filles","Theatre Native","Jipcot","The King Of Prs","Primoz","Indiana Jones","Excello"] },
    { time: "16:40", name: "Oddschecker Sefton Novices' Hurdle", grade: "Grade 1", distance: "3m 149y",
      runners: ["Catchintsavo","Dalston Lad","Frankie John","Harbour Island","Johnny's Jury","Kripticjim","Mondoui'boy","No Drama This End","Seaniecon","Shadow Paddy","Talk To The Man","Zeus Power","Good Girl Kathleen"] },
    { time: "17:15", name: "Debenhams Handicap Hurdle", grade: "Class 2", distance: "2m 103y",
      runners: ["Laafi","Captain Ryan Matt","Wreckless Eric","Last Kingdom","Rubber Ball","Charlus","Litleangel Duseuil","Wild Bill Hickok","Static","Ehteyat","Sherminator","Harry Lowes","Melon"] }
  ]
};

let state = {
  players: [],
  stake: 2,
  currentDay: 'thursday',
  draws: { thursday: {}, friday: {} },
  results: { thursday: {}, friday: {} },
  scores: {}
};

let pendingResults = {};

const PLAYER_COLORS = ['#f1c40f', '#c8a862', '#3498db', '#2ecc71'];

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.textContent;
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function save() { localStorage.setItem('aintree2026', JSON.stringify(state)); }

function load() {
  const s = localStorage.getItem('aintree2026');
  if (s) { state = JSON.parse(s); return true; }
  return false;
}

function startSweepstake() {
  const inputs = document.querySelectorAll('#playerInputs input');
  const players = [];
  inputs.forEach(inp => { if (inp.value.trim()) players.push(inp.value.trim()); });
  if (players.length < 2) { alert('Need at least 2 players!'); return; }
  state.players = players;
  state.stake = parseFloat(document.getElementById('stakeInput').value) || 2;
  state.scores = {};
  players.forEach(p => state.scores[p] = 0);
  save();
  showApp();
}

function showApp() {
  document.getElementById('setup').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  renderScoreboard();
  renderRaces();
}

function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.replaceChildren();
  const sorted = [...state.players].sort((a, b) => (state.scores[b] || 0) - (state.scores[a] || 0));
  sorted.forEach((p, i) => {
    const item = document.createElement('div');
    item.className = 'score-item';
    const nameDiv = document.createElement('div');
    nameDiv.className = 'score-name';
    nameDiv.textContent = p;
    const valDiv = document.createElement('div');
    valDiv.className = 'score-value';
    valDiv.style.color = PLAYER_COLORS[state.players.indexOf(p) % PLAYER_COLORS.length];
    valDiv.textContent = '\u00A3' + (state.scores[p] || 0).toFixed(2);
    item.appendChild(nameDiv);
    item.appendChild(valDiv);
    sb.appendChild(item);
  });
}

function switchDay(day) {
  state.currentDay = day;
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + day).classList.add('active');
  renderRaces();
}

function renderRaces() {
  const container = document.getElementById('racesContainer');
  container.replaceChildren();
  const races = RACE_DATA[state.currentDay];
  const dayDraws = state.draws[state.currentDay];
  const dayResults = state.results[state.currentDay];

  races.forEach((race, idx) => {
    const drawn = dayDraws[idx];
    const result = dayResults[idx];

    const raceDiv = document.createElement('div');
    raceDiv.className = 'race';
    raceDiv.id = 'race-' + idx;

    // Header
    const header = document.createElement('div');
    header.className = 'race-header';
    header.onclick = () => toggleRace(idx);

    const timeDiv = document.createElement('div');
    timeDiv.className = 'race-time';
    timeDiv.textContent = race.time;

    const infoDiv = document.createElement('div');
    infoDiv.className = 'race-info';
    const nameDiv = document.createElement('div');
    nameDiv.className = 'race-name';
    nameDiv.textContent = race.name;
    const metaDiv = document.createElement('div');
    metaDiv.className = 'race-meta';
    metaDiv.textContent = race.grade + ' \u2022 ' + race.distance + ' \u2022 ' + race.runners.length + ' runners';
    infoDiv.appendChild(nameDiv);
    infoDiv.appendChild(metaDiv);

    const statusSpan = document.createElement('span');
    statusSpan.className = 'race-status';
    if (result) { statusSpan.classList.add('status-result'); statusSpan.textContent = 'Result in'; }
    else if (drawn) { statusSpan.classList.add('status-drawn'); statusSpan.textContent = 'Drawn'; }
    else { statusSpan.classList.add('status-pending'); statusSpan.textContent = 'Not drawn'; }

    header.appendChild(timeDiv);
    header.appendChild(infoDiv);
    header.appendChild(statusSpan);
    raceDiv.appendChild(header);

    // Body
    const body = document.createElement('div');
    body.className = 'race-body';
    body.id = 'race-body-' + idx;

    if (drawn) {
      buildDrawContent(body, idx, drawn, result, race);
    } else {
      const p = document.createElement('p');
      p.style.cssText = 'color:#888;font-size:.9rem;margin-bottom:.8rem;';
      p.textContent = race.runners.length + ' runners to be split between ' + state.players.length + ' players';
      body.appendChild(p);
      const btn = document.createElement('button');
      btn.className = 'btn btn-primary btn-small';
      btn.textContent = 'Draw This Race';
      btn.onclick = () => drawRace(idx);
      body.appendChild(btn);
    }

    raceDiv.appendChild(body);
    container.appendChild(raceDiv);
  });
}

function buildDrawContent(body, idx, drawn, result, race) {
  const grid = document.createElement('div');
  grid.className = 'draw-grid';
  grid.style.marginTop = '.8rem';

  state.players.forEach(player => {
    const horses = drawn[player] || [];
    const pDiv = document.createElement('div');
    pDiv.className = 'player-draw';

    const pName = document.createElement('div');
    pName.className = 'player-draw-name';
    pName.style.color = PLAYER_COLORS[state.players.indexOf(player) % PLAYER_COLORS.length];
    pName.textContent = player + ' (' + horses.length + ' horses)';
    pDiv.appendChild(pName);

    const tags = document.createElement('div');
    tags.className = 'horse-tags';
    horses.forEach(h => {
      const tag = document.createElement('span');
      tag.className = 'horse-tag';
      if (result && result.first === h) tag.classList.add('winner');
      else if (result && result.second === h) tag.classList.add('placed');
      tag.textContent = h;
      tags.appendChild(tag);
    });
    pDiv.appendChild(tags);
    grid.appendChild(pDiv);
  });
  body.appendChild(grid);

  if (!result) {
    const ws = document.createElement('div');
    ws.className = 'winner-section';

    const h1 = document.createElement('h4');
    h1.textContent = 'Select 1st place:';
    ws.appendChild(h1);
    const sel1 = document.createElement('div');
    sel1.className = 'winner-select';
    sel1.id = 'winner-1st-' + idx;
    race.runners.forEach(h => {
      const btn = document.createElement('button');
      btn.className = 'winner-btn';
      btn.textContent = h;
      btn.onclick = () => selectResult(idx, h, 1);
      sel1.appendChild(btn);
    });
    ws.appendChild(sel1);

    const h2 = document.createElement('h4');
    h2.textContent = 'Select 2nd place:';
    h2.style.marginTop = '.5rem';
    ws.appendChild(h2);
    const sel2 = document.createElement('div');
    sel2.className = 'winner-select';
    sel2.id = 'winner-2nd-' + idx;
    race.runners.forEach(h => {
      const btn = document.createElement('button');
      btn.className = 'winner-btn';
      btn.textContent = h;
      btn.onclick = () => selectResult(idx, h, 2);
      sel2.appendChild(btn);
    });
    ws.appendChild(sel2);

    const acts = document.createElement('div');
    acts.className = 'actions';
    const confirmBtn = document.createElement('button');
    confirmBtn.className = 'btn btn-success btn-small';
    confirmBtn.textContent = 'Confirm Result';
    confirmBtn.onclick = () => confirmResult(idx);
    acts.appendChild(confirmBtn);
    ws.appendChild(acts);
    body.appendChild(ws);
  } else {
    const banner = document.createElement('div');
    banner.className = 'result-banner';
    const pot = state.players.length * state.stake;
    const w1 = findPlayerWithHorse(idx, result.first);
    const w2 = findPlayerWithHorse(idx, result.second);
    const p1 = (pot * 0.7).toFixed(2);
    const p2 = (pot * 0.3).toFixed(2);

    const b = document.createElement('span');
    const line1 = document.createElement('strong');
    line1.textContent = '1st: ';
    banner.appendChild(line1);
    banner.appendChild(document.createTextNode(result.first));
    if (w1) {
      banner.appendChild(document.createTextNode(' \u2014 '));
      const s1 = document.createElement('strong');
      s1.textContent = w1;
      banner.appendChild(s1);
      banner.appendChild(document.createTextNode(' wins \u00A3' + p1));
    } else {
      banner.appendChild(document.createTextNode(' \u2014 no one had it!'));
    }
    banner.appendChild(document.createTextNode('   |   '));
    const line2 = document.createElement('strong');
    line2.textContent = '2nd: ';
    banner.appendChild(line2);
    banner.appendChild(document.createTextNode(result.second));
    if (w2) {
      banner.appendChild(document.createTextNode(' \u2014 '));
      const s2 = document.createElement('strong');
      s2.textContent = w2;
      banner.appendChild(s2);
      banner.appendChild(document.createTextNode(' wins \u00A3' + p2));
    } else {
      banner.appendChild(document.createTextNode(' \u2014 no one had it!'));
    }
    body.appendChild(banner);
  }
}

function toggleRace(idx) {
  document.getElementById('race-body-' + idx).classList.toggle('open');
}

function drawRace(idx) {
  const race = RACE_DATA[state.currentDay][idx];
  const shuffled = shuffle(race.runners);
  const draw = {};
  state.players.forEach(p => draw[p] = []);
  shuffled.forEach((horse, i) => {
    draw[state.players[i % state.players.length]].push(horse);
  });
  state.draws[state.currentDay][idx] = draw;
  save();
  renderRaces();
  document.getElementById('race-body-' + idx).classList.add('open');
}

function drawAllRaces() {
  RACE_DATA[state.currentDay].forEach((_, idx) => {
    if (!state.draws[state.currentDay][idx]) drawRace(idx);
  });
  renderRaces();
}

function selectResult(raceIdx, horse, place) {
  if (!pendingResults[raceIdx]) pendingResults[raceIdx] = {};
  if (place === 1) pendingResults[raceIdx].first = horse;
  if (place === 2) pendingResults[raceIdx].second = horse;

  const containerId = 'winner-' + (place === 1 ? '1st' : '2nd') + '-' + raceIdx;
  const container = document.getElementById(containerId);
  if (!container) return;
  const cls = place === 1 ? 'selected-1st' : 'selected-2nd';
  container.querySelectorAll('.winner-btn').forEach(btn => {
    btn.classList.remove(cls);
    if (btn.textContent === horse) btn.classList.add(cls);
  });
}

function confirmResult(raceIdx) {
  const pending = pendingResults[raceIdx];
  if (!pending || !pending.first || !pending.second) { alert('Select both 1st and 2nd place first!'); return; }
  if (pending.first === pending.second) { alert('1st and 2nd must be different horses!'); return; }

  state.results[state.currentDay][raceIdx] = { first: pending.first, second: pending.second };
  const pot = state.players.length * state.stake;
  const w1 = findPlayerWithHorse(raceIdx, pending.first);
  const w2 = findPlayerWithHorse(raceIdx, pending.second);
  if (w1) state.scores[w1] = (state.scores[w1] || 0) + pot * 0.7;
  if (w2) state.scores[w2] = (state.scores[w2] || 0) + pot * 0.3;

  delete pendingResults[raceIdx];
  save();
  renderScoreboard();
  renderRaces();
  document.getElementById('race-body-' + raceIdx).classList.add('open');
  if (w1) fireConfetti();
}

function findPlayerWithHorse(raceIdx, horse) {
  const draw = state.draws[state.currentDay][raceIdx];
  if (!draw) return null;
  for (const player of state.players) {
    if (draw[player] && draw[player].includes(horse)) return player;
  }
  return null;
}

function resetDay() {
  if (!confirm('Reset all draws and results for this day?')) return;
  const dayResults = state.results[state.currentDay];
  for (const raceIdx in dayResults) {
    const res = dayResults[raceIdx];
    const pot = state.players.length * state.stake;
    const w1 = findPlayerWithHorse(parseInt(raceIdx), res.first);
    const w2 = findPlayerWithHorse(parseInt(raceIdx), res.second);
    if (w1) state.scores[w1] -= pot * 0.7;
    if (w2) state.scores[w2] -= pot * 0.3;
  }
  state.draws[state.currentDay] = {};
  state.results[state.currentDay] = {};
  pendingResults = {};
  save();
  renderScoreboard();
  renderRaces();
}

function fireConfetti() {
  const colors = ['#ffffff', '#f5f5f5', '#333333', '#f1c40f', '#2ecc71', '#3498db'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
    el.style.width = (Math.random() * 8 + 5) + 'px';
    el.style.height = (Math.random() * 8 + 5) + 'px';
    document.body.appendChild(el);
    const dur = Math.random() * 2 + 1.5;
    el.animate([
      { transform: 'translateY(0) rotate(0deg)', opacity: 1 },
      { transform: 'translateY(' + (window.innerHeight + 50) + 'px) rotate(' + (Math.random()*720-360) + 'deg)', opacity: 0 }
    ], { duration: dur * 1000, easing: 'cubic-bezier(.2,.8,.4,1)' }).onfinish = () => el.remove();
  }
}

// ── View switching ──
let currentView = 'races';

function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('view-' + view).classList.add('active');
  document.getElementById('racesView').classList.toggle('hidden', view !== 'races');
  document.getElementById('horsesView').classList.toggle('hidden', view !== 'horses');
  document.getElementById('settlementView').classList.toggle('hidden', view !== 'settlement');
  if (view === 'horses') renderHorsesOverview();
  if (view === 'settlement') renderSettlement();
}

// ── All Horses view ──
function renderHorsesOverview() {
  const container = document.getElementById('horsesContainer');
  container.replaceChildren();

  const days = [
    { key: 'thursday', label: 'Thursday 9 Apr' },
    { key: 'friday', label: 'Friday 10 Apr' }
  ];

  for (const player of state.players) {
    const card = document.createElement('div');
    card.className = 'player-portfolio';

    const h3 = document.createElement('h3');
    h3.style.color = PLAYER_COLORS[state.players.indexOf(player) % PLAYER_COLORS.length];
    h3.textContent = player;
    card.appendChild(h3);

    let totalHorses = 0;

    for (const day of days) {
      const dayDraws = state.draws[day.key];
      const dayResults = state.results[day.key];
      const races = RACE_DATA[day.key];
      if (!dayDraws || Object.keys(dayDraws).length === 0) continue;

      const dayLabel = document.createElement('div');
      dayLabel.style.cssText = 'font-size:.7rem;color:#666;text-transform:uppercase;letter-spacing:1px;margin-top:.6rem;margin-bottom:.4rem;';
      dayLabel.textContent = day.label;
      card.appendChild(dayLabel);

      races.forEach((race, idx) => {
        const draw = dayDraws[idx];
        if (!draw || !draw[player] || draw[player].length === 0) return;

        const raceDiv = document.createElement('div');
        raceDiv.className = 'portfolio-race';

        const raceName = document.createElement('div');
        raceName.className = 'portfolio-race-name';
        raceName.textContent = race.time + ' ' + race.name;
        raceDiv.appendChild(raceName);

        const horses = document.createElement('div');
        horses.className = 'portfolio-horses';
        const result = dayResults[idx];
        draw[player].forEach(h => {
          const tag = document.createElement('span');
          tag.className = 'horse-tag';
          if (result && result.first === h) tag.classList.add('winner');
          else if (result && result.second === h) tag.classList.add('placed');
          tag.textContent = h;
          horses.appendChild(tag);
          totalHorses++;
        });
        raceDiv.appendChild(horses);
        card.appendChild(raceDiv);
      });
    }

    const summary = document.createElement('div');
    summary.style.cssText = 'margin-top:.8rem;padding-top:.6rem;border-top:1px solid #333;font-size:.85rem;color:#999;';
    summary.textContent = totalHorses + ' horses total';
    card.appendChild(summary);

    container.appendChild(card);
  }

  if (container.children.length === 0) {
    const msg = document.createElement('p');
    msg.style.cssText = 'color:#666;text-align:center;padding:2rem;';
    msg.textContent = 'No draws yet. Go to Races and draw first.';
    container.appendChild(msg);
  }
}

// ── Settlement view ──
function renderSettlement() {
  const container = document.getElementById('settlementContainer');
  container.replaceChildren();

  const card = document.createElement('div');
  card.className = 'settlement';

  const h3 = document.createElement('h3');
  h3.textContent = 'Settlement';
  card.appendChild(h3);

  // Calculate net position per player
  const totalRacesWithDraws = countDrawnRaces();
  const stakePerRace = state.stake;
  const net = {};
  state.players.forEach(p => {
    const totalStaked = totalRacesWithDraws * stakePerRace;
    const totalWon = state.scores[p] || 0;
    net[p] = totalWon - totalStaked;
  });

  // Show each player's position
  const sorted = [...state.players].sort((a, b) => net[b] - net[a]);
  sorted.forEach(p => {
    const row = document.createElement('div');
    row.className = 'settlement-row';

    const name = document.createElement('span');
    name.className = 'settlement-name';
    name.textContent = p;
    row.appendChild(name);

    const details = document.createElement('div');
    details.style.textAlign = 'right';

    const won = document.createElement('div');
    won.className = 'settlement-amount';
    const n = net[p];
    if (n > 0) { won.classList.add('settlement-positive'); won.textContent = '+\u00A3' + n.toFixed(2); }
    else if (n < 0) { won.classList.add('settlement-negative'); won.textContent = '-\u00A3' + Math.abs(n).toFixed(2); }
    else { won.classList.add('settlement-zero'); won.textContent = '\u00A30.00'; }
    details.appendChild(won);

    const breakdown = document.createElement('div');
    breakdown.style.cssText = 'font-size:.75rem;color:#666;';
    breakdown.textContent = 'Won \u00A3' + (state.scores[p] || 0).toFixed(2) + ' / Staked \u00A3' + (totalRacesWithDraws * stakePerRace).toFixed(2);
    details.appendChild(breakdown);

    row.appendChild(details);
    card.appendChild(row);
  });

  // Calculate transfers (who pays who)
  const transfers = calculateTransfers(net);
  if (transfers.length > 0) {
    const section = document.createElement('div');
    section.className = 'settlement-transfers';

    const th = document.createElement('h4');
    th.style.cssText = 'font-size:.85rem;color:#999;margin-bottom:.5rem;';
    th.textContent = 'To settle up:';
    section.appendChild(th);

    transfers.forEach(t => {
      const row = document.createElement('div');
      row.className = 'transfer-row';
      const from = document.createElement('strong');
      from.textContent = t.from;
      from.style.color = PLAYER_COLORS[state.players.indexOf(t.from) % PLAYER_COLORS.length];
      const arrow = document.createElement('span');
      arrow.className = 'transfer-arrow';
      arrow.textContent = ' pays ';
      const to = document.createElement('strong');
      to.textContent = t.to;
      to.style.color = PLAYER_COLORS[state.players.indexOf(t.to) % PLAYER_COLORS.length];
      const amount = document.createElement('span');
      amount.textContent = ' \u00A3' + t.amount.toFixed(2);
      amount.style.color = '#fff';
      row.appendChild(from);
      row.appendChild(arrow);
      row.appendChild(to);
      row.appendChild(amount);
      section.appendChild(row);
    });
    card.appendChild(section);
  }

  // Races remaining
  const totalRaces = RACE_DATA.thursday.length + RACE_DATA.friday.length;
  const resultsIn = Object.keys(state.results.thursday).length + Object.keys(state.results.friday).length;

  const footer = document.createElement('div');
  footer.style.cssText = 'margin-top:1rem;padding-top:.8rem;border-top:1px solid #333;font-size:.8rem;color:#666;text-align:center;';
  footer.textContent = resultsIn + ' of ' + totalRaces + ' races completed';
  card.appendChild(footer);

  container.appendChild(card);
}

function countDrawnRaces() {
  let count = 0;
  for (const day of ['thursday', 'friday']) {
    count += Object.keys(state.draws[day] || {}).length;
  }
  return count;
}

function calculateTransfers(net) {
  // Greedy settlement: people who owe pay people who are owed
  const debtors = [];
  const creditors = [];
  for (const p in net) {
    if (net[p] < -0.01) debtors.push({ name: p, amount: -net[p] });
    else if (net[p] > 0.01) creditors.push({ name: p, amount: net[p] });
  }
  debtors.sort((a, b) => b.amount - a.amount);
  creditors.sort((a, b) => b.amount - a.amount);

  const transfers = [];
  let di = 0, ci = 0;
  while (di < debtors.length && ci < creditors.length) {
    const amt = Math.min(debtors[di].amount, creditors[ci].amount);
    if (amt > 0.01) {
      transfers.push({ from: debtors[di].name, to: creditors[ci].name, amount: amt });
    }
    debtors[di].amount -= amt;
    creditors[ci].amount -= amt;
    if (debtors[di].amount < 0.01) di++;
    if (creditors[ci].amount < 0.01) ci++;
  }
  return transfers;
}

// ── Fetch results from API ──
async function fetchResults() {
  const btn = document.getElementById('fetchBtn');
  btn.classList.add('loading');
  btn.disabled = true;

  const dateMap = { thursday: '2026-04-09', friday: '2026-04-10' };
  const date = dateMap[state.currentDay];

  try {
    const resp = await fetch('/api/results?date=' + date);
    if (!resp.ok) throw new Error('API returned ' + resp.status);
    const data = await resp.json();

    if (!data.results || data.results.length === 0) {
      alert('No results available yet. Races may not have finished.');
      return;
    }

    const races = RACE_DATA[state.currentDay];
    const dayDraws = state.draws[state.currentDay];
    let applied = 0;

    data.results.forEach(r => {
      // Match result to race by time
      const raceIdx = races.findIndex(race => race.time === r.time);
      if (raceIdx === -1) return;
      if (state.results[state.currentDay][raceIdx]) return; // already have result
      if (!dayDraws[raceIdx]) return; // not drawn

      // Fuzzy match horse names (API might have slight differences)
      const first = fuzzyMatchHorse(r.first, races[raceIdx].runners);
      const second = r.second ? fuzzyMatchHorse(r.second, races[raceIdx].runners) : null;

      if (first && second && first !== second) {
        state.results[state.currentDay][raceIdx] = { first, second };
        const pot = state.players.length * state.stake;
        const w1 = findPlayerWithHorse(raceIdx, first);
        const w2 = findPlayerWithHorse(raceIdx, second);
        if (w1) state.scores[w1] = (state.scores[w1] || 0) + pot * 0.7;
        if (w2) state.scores[w2] = (state.scores[w2] || 0) + pot * 0.3;
        applied++;
      }
    });

    save();
    renderScoreboard();
    renderRaces();

    if (applied > 0) {
      alert(applied + ' new result' + (applied > 1 ? 's' : '') + ' applied!');
      fireConfetti();
    } else {
      alert('No new results to apply. Check back after the next race.');
    }
  } catch (err) {
    alert('Could not fetch results: ' + err.message + '\nYou can still enter results manually by clicking a race.');
  } finally {
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

function fuzzyMatchHorse(apiName, runners) {
  if (!apiName) return null;
  const clean = apiName.toLowerCase().replace(/[^a-z]/g, '');
  // Exact match first
  for (const r of runners) {
    if (r.toLowerCase().replace(/[^a-z]/g, '') === clean) return r;
  }
  // Partial match (API name contains runner or vice versa)
  for (const r of runners) {
    const rc = r.toLowerCase().replace(/[^a-z]/g, '');
    if (rc.includes(clean) || clean.includes(rc)) return r;
  }
  return null;
}

// Init
if (load() && state.players.length > 0) {
  showApp();
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + state.currentDay).classList.add('active');
}
